    logicalType: object
    required: true
  - name: verdict.label
    logicalType: string
    required: true
    validValues:
    - APPROVE
    - REJECT
    - NEEDS_WORK
  - name: verdict.rationale
    logicalType: string
    required: true
  - name: verdict.confidence
    logicalType: number
    required: true
    min: 0.0
    max: 1.0
