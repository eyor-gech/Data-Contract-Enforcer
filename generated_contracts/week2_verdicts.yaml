    logicalType: string
    required: true
  - name: trace_id
    logicalType: string
    required: true
  - name: intent_id
    logicalType: string
    required: true
  - name: created_at
    logicalType: string
    required: true
  - name: target_ref.file
    logicalType: string
    required: true
  - name: target_ref.span.start_line
    logicalType: integer
    required: true
    min: 1
  - name: target_ref.span.end_line
    logicalType: integer
    required: true
    min: 1
  - name: model.provider
    logicalType: string
    required: true
    validValues:
    - openai
    - anthropic
  - name: model.name
    logicalType: string
    required: true
  - name: scores.correctness
    logicalType: integer
    required: true
    min: 1
    max: 5
  - name: scores.safety
    logicalType: integer
    required: true
    min: 1
    max: 5
  - name: scores.style
    logicalType: integer
    required: true
    min: 1
    max: 5
  - name: scores.weighted_score
    logicalType: number
    required: true
    min: 1.0
    max: 5.0
  - name: scores.weights
    logicalType: object
    required: true
  - name: verdict.label
    logicalType: string
    required: true
    validValues:
    - APPROVE
    - REJECT
    - NEEDS_WORK
  - name: verdict.rationale
    logicalType: string
    required: true
  - name: verdict.confidence
    logicalType: number
    required: true
    min: 0.0
    max: 1.0
