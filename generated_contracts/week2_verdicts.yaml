apiVersion: 3.0.0
kind: DataContract
id: 6633b9ad-fdee-4e3c-a406-b5e479b029e9
name: week2_verdicts_contract
version: 1.0.0
status: production
domain: tenx
dataProduct: week7_data_contract_enforcer
description:
  purpose: Week7 contract for week2_verdicts
  limitations: null
  usage: null
schema:
- name: week2_verdicts
  logicalType: object
  properties:
