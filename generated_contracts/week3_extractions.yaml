apiVersion: 3.0.0
kind: DataContract
id: 7fd02684-e381-45a7-b623-71c9f752f9ab
name: week3_extractions_contract
version: 1.0.0
status: production
domain: tenx
dataProduct: week7_data_contract_enforcer
description:
  purpose: Week7 contract for week3_extractions
  limitations: null
  usage: null
schema:
- name: week3_extractions
  logicalType: object
  properties:
  - name: extraction_id
    logicalType: string
    required: true
  - name: trace_id
    logicalType: string
    required: true
  - name: created_at
    logicalType: string
    required: true
  - name: doc_id
    logicalType: string
    required: true
  - name: doc_key
    logicalType: string
    required: true
  - name: page_number
    logicalType: integer
    required: true
    min: 1
  - name: strategy.name
    logicalType: string
    required: true
    validValues:
    - vision
    - ocr
    - hybrid
  - name: confidence
    logicalType: number
    required: true
    min: 0.0
    max: 1.0
  - name: threshold
    logicalType: number
    required: true
    min: 0.0
    max: 1.0
  - name: processing_time_ms
    logicalType: number
    required: true
    min: 0.0
  - name: cost_usd
    logicalType: number
    required: true
    min: 0.0
  - name: flags.escalated
    logicalType: boolean
    required: true
  - name: flags.flagged_for_review
    logicalType: boolean
    required: true
  - name: text
    logicalType: string
    required: false
  - name: labels
    logicalType: array
    required: true
quality:
- type: custom
  engine: week7_enforcer
  implementation:
    dataset: week3_extractions
    rules:
    - type: row_count_min
      min: 50
      clause_id: week3_extractions__clause_001
      description: Prevents empty/insufficient datasets from silently passing.
    - type: type
      field: extraction_id
      expected: uuid
      clause_id: week3_extractions__clause_002
      description: Prevents implicit coercion by enforcing declared type for `extraction_id`.
