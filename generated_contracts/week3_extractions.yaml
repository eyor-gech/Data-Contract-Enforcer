      clause_id: week3_extractions__clause_009
      description: Prevents implicit coercion by enforcing declared type for `confidence`.
    - type: type
      field: threshold
      expected: number
      clause_id: week3_extractions__clause_010
      description: Prevents implicit coercion by enforcing declared type for `threshold`.
    - type: type
      field: processing_time_ms
      expected: number
      clause_id: week3_extractions__clause_011
      description: Prevents implicit coercion by enforcing declared type for `processing_time_ms`.
    - type: type
      field: cost_usd
      expected: number
      clause_id: week3_extractions__clause_012
      description: Prevents implicit coercion by enforcing declared type for `cost_usd`.
    - type: type
      field: flags.escalated
